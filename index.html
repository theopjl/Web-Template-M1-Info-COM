<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nom du projet — M1 Communication</title>

  <!-- Google Font : Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Tailwind CSS via CDN (pas de build requis) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Surcharges locales (font, focus visible…) -->
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>

<!-- Design tokens de base appliqués sur body via classes Tailwind -->
<body class="bg-white text-gray-900 antialiased font-sans">

  <!-- =====================================================
       HEADER — Navigation principale
       À remplir par l'agent IA : logo, nom du projet, liens
  ====================================================== -->
  <header class="sticky top-0 z-50 border-b border-gray-100 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-5xl items-center justify-between px-6 py-4">

      <!-- Nom / logo du projet -->
      <a href="#" class="text-lg font-semibold tracking-tight text-gray-900">
        Nom du projet
        <!-- À remplir par l'agent IA : remplacer par le vrai nom -->
      </a>

      <!-- Navigation principale (desktop) -->
      <nav aria-label="Navigation principale">
        <ul class="flex items-center gap-6 text-sm font-medium text-gray-600">
          <li>
            <a href="#about"   class="hover:text-gray-900 transition-colors focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-gray-900 rounded">
              À propos
            </a>
          </li>
          <li>
            <a href="#project" class="hover:text-gray-900 transition-colors focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-gray-900 rounded">
              Le projet
            </a>
          </li>
          <li>
            <a href="#contact" class="hover:text-gray-900 transition-colors focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-gray-900 rounded">
              Contact
            </a>
          </li>
        </ul>
      </nav>

      <!-- TODO (agent IA) : ajouter ici un bouton CTA ou menu mobile si besoin -->
    </div>
  </header>

  <main>

    <!-- =====================================================
         SECTION : À propos  (#about)
         À remplir par l'agent IA : accroche, description, visuel
    ====================================================== -->
    <section id="about" class="py-24 px-6">
      <div class="mx-auto max-w-5xl">

        <!-- Titre principal de la page (H1) -->
        <h1 class="text-4xl font-bold tracking-tight text-gray-900 sm:text-5xl">
          Titre principal
          <!-- À remplir par l'agent IA -->
        </h1>

        <!-- Accroche courte -->
        <p class="mt-4 max-w-2xl text-lg text-gray-500">
          Courte description du projet ou de l'organisation.
          <!-- À remplir par l'agent IA -->
        </p>

        <!-- Bloc de contenu libre -->
        <!-- À remplir par l'agent IA : paragraphes, image, liste de points forts… -->
      </div>
    </section>

    <!-- =====================================================
         SECTION : Le projet  (#project)
         À remplir par l'agent IA : présentation détaillée, cards, médias
    ====================================================== -->
    <section id="project" class="bg-gray-50 py-24 px-6">
      <div class="mx-auto max-w-5xl">

        <h2 class="text-3xl font-semibold text-gray-900">
          Le projet
          <!-- À remplir par l'agent IA -->
        </h2>

        <p class="mt-3 text-gray-500">
          Présentation du projet, de ses objectifs et de ses livrables.
          <!-- À remplir par l'agent IA -->
        </p>

        <!-- Zone de contenu (cards, grilles, médias…) -->
        <!-- À remplir par l'agent IA -->
      </div>
    </section>

    <!-- =====================================================
         SECTION : Contact  (#contact)
         À remplir par l'agent IA : mise à jour des labels, action du formulaire
    ====================================================== -->
    <section id="contact" class="py-24 px-6">
      <div class="mx-auto max-w-xl">

        <h2 class="text-3xl font-semibold text-gray-900">
          Contact
        </h2>

        <p class="mt-3 text-gray-500">
          Remplissez le formulaire ci-dessous pour nous contacter.
          <!-- À remplir par l'agent IA -->
        </p>

        <!-- Formulaire de contact minimal — accessible -->
        <!-- À remplir par l'agent IA : action="", method="post" ou logique JS -->
        <form class="mt-8 space-y-6" novalidate>

          <div>
            <label for="name" class="block text-sm font-medium text-gray-700">
              Nom
            </label>
            <input
              id="name"
              name="name"
              type="text"
              autocomplete="name"
              required
              placeholder="Votre nom"
              class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2.5 text-gray-900
                     placeholder:text-gray-400 shadow-sm
                     focus:border-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-900/20"
            />
          </div>

          <div>
            <label for="email" class="block text-sm font-medium text-gray-700">
              Adresse e-mail
            </label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              required
              placeholder="vous@exemple.com"
              class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2.5 text-gray-900
                     placeholder:text-gray-400 shadow-sm
                     focus:border-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-900/20"
            />
          </div>

          <div>
            <label for="message" class="block text-sm font-medium text-gray-700">
              Message
            </label>
            <textarea
              id="message"
              name="message"
              rows="5"
              required
              placeholder="Votre message…"
              class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2.5 text-gray-900
                     placeholder:text-gray-400 shadow-sm resize-none
                     focus:border-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-900/20"
            ></textarea>
          </div>

          <button
            type="submit"
            class="w-full rounded-lg bg-gray-900 px-6 py-3 text-sm font-semibold text-white shadow
                   hover:bg-gray-700 active:scale-95 transition-all
                   focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-gray-900"
          >
            Envoyer le message
          </button>

        </form>
        <!-- Fin formulaire contact -->

      </div>
    </section>

  </main>

  <!-- =====================================================
       FOOTER
       À remplir par l'agent IA : mention légale, liens, crédits
  ====================================================== -->
  <footer class="border-t border-gray-100 py-8 px-6">
    <div class="mx-auto max-w-5xl flex flex-col items-center gap-2 text-sm text-gray-400 sm:flex-row sm:justify-between">

      <p>
        &copy; <span id="year"></span> Nom du projet — M1 Communication
        <!-- À remplir par l'agent IA -->
      </p>

      <!-- Liens légaux optionnels -->
      <!-- À remplir par l'agent IA : mentions légales, politique de confidentialité RGPD -->
    </div>
  </footer>

  <!-- Script JS optionnel -->
  <script src="assets/js/main.js"></script>

</body>
</html>
